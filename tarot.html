<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>🎂 祝大伯生日快乐！</title>
  <link rel="shortcut icon" type="image/png" href="img/favicon.png" />
  <link rel="stylesheet" href="style/style.css">
  <style>
    /* 适配长辈：更大的字体和更暖的色调 */
    body {
      background: linear-gradient(180deg, #fff8f0 0%, #ffe4cc 30%, #ffd4a8 60%, #ffe4cc 100%);
      font-family: 'Ma Shan Zheng', 'STKaiti', 'KaiTi', serif;
    }

    /* 开始提示弹窗 */
    .startSign {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(245, 158, 11, 0.2);
    }

    .startSign .two {
      color: #8b4513;
    }

    .startSign .button {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: white !important;
      border: none;
      border-radius: 50px;
      font-size: 1.3rem;
      padding: 1rem 2.5rem !important;
      box-shadow: 0 5px 20px rgba(239, 68, 68, 0.3);
      transition: all 0.3s ease;
    }

    .startSign .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(239, 68, 68, 0.5);
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
    }

    /* 播放按钮 */
    .play-pause {
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.1));
    }

    /* 标题颜色 */
    .one h1 {
      color: #c0392b;
    }

    /* 聊天框 */
    .text-box {
      background: white;
      border-color: #f59e0b !important;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

    .fake-btn {
      background-color: #f59e0b !important;
      border-radius: 20px !important;
    }

    /* 特殊强调 */
    .idea-3 strong {
      background-color: #ef4444 !important;
      color: #fff !important;
    }

    .idea-5 span {
      color: #c0392b;
    }

    .idea-6 span {
      color: #e74c3c;
      text-shadow: 3px 3px 0 rgba(245, 158, 11, 0.3);
    }

    /* 祝福 */
    .wish-hbd {
      color: #c0392b;
    }

    .wish h5 {
      color: #8b4513;
    }

    /* 重新播放 */
    #replay {
      color: #e67e22;
      font-weight: bold;
    }

    .nine p {
      color: #5d3a1a;
    }

    .last-smile {
      font-size: 3rem;
    }

    /* 移动端适配 */
    @media screen and (max-width: 500px) {
      .startSign {
        padding: 20px;
        margin: 10vh 5vw;
      }

      .startSign .button {
        font-size: 1.1rem;
        padding: 0.8rem 1.5rem !important;
      }

      .one {
        font-size: 3rem;
      }

      .three {
        font-size: 2rem;
      }

      .five p {
        font-size: 1.5rem;
      }

      .five .idea-5 {
        font-size: 2.5rem;
      }

      .idea-6 span {
        font-size: 8rem;
      }

      .wish-hbd {
        font-size: 2em;
      }
    }
  </style>
</head>

<body>
  <button id="playPauseButton" class="play-pause"></button>
  <div class="startSign">
    <p class="two">🎧 温馨提醒：佩戴耳机并播放音乐可获得最佳体验哦 😊</p>
    <!-- 开始按钮 -->
    <p id="startButton" class="two button">准备好了，我们开始吧！✨</p>
  </div>

  <div class="container">
    <div class="one">
      <h1 class="one">
        <span data-node-name="greeting">亲爱的</span>
        <span data-node-name="name">大伯</span>
      </h1>
      <p class="two" data-node-name="greetingText">三尺讲台育桃李，一支粉笔写春秋。今天，请收下我们最真挚的祝福</p>
    </div>
    <div class="three">
      <p data-node-name="text1">今天是您的生日啊!!! :D</p>
    </div>
    <div class="four">
      <div class="text-box">
        <p class="hbd-chatbox" data-node-name="textInChatBox">大伯生日快乐！祝您桃李芬芳，教泽流长，事业顺遂，阖家幸福！🎂📚</p>
        <p class="fake-btn" data-node-name="sendButtonLabel">发送</p>
      </div>
    </div>
    <div class="five">
      <p class="idea-1" data-node-name="text2">我们想给您一个惊喜</p>
      <p class="idea-2" data-node-name="text3">我们认真地想了很久</p>
      <p class="idea-3">
        <span data-node-name="text4">我们想做一些</span>
        <strong data-node-name="text4Adjective">特别的</strong>
      </p>
      <p class="idea-4" data-node-name="text5Entry">因为，</p>
      <p class="idea-5">
        <span data-node-name="text5Content">您是我们最敬爱的大伯</span>
        <span class="smiley" data-node-name="smiley">❤️</span>
      </p>
      <p class="idea-6">
        <span data-node-name="bigTextPart1">祝</span>
        <span data-node-name="bigTextPart2">福</span>
      </p>
    </div>
    <div class="six">
      <img src="img/dabo.svg" alt="大伯" class="lydia-dp" data-node-name="imagePath">
      <img src="img/hat.svg" alt="" class="hat">
      <div class="wish">
        <h3 class="wish-hbd" data-node-name="wishHeading">生日快乐！</h3>
        <h5 data-node-name="wishText">愿您桃李满天下，春晖遍四方！工作顺利，身体倍棒，每天都有一份好心情！</h5>
      </div>
    </div>
    <div class="seven">
      <div class="baloons">
        <img src="img/ballon2.svg" alt="">
        <img src="img/ballon1.svg" alt="">
        <img src="img/ballon3.svg" alt="">
        <img src="img/ballon1.svg" alt="">

        <img src="img/ballon2.svg" alt="">
        <img src="img/ballon3.svg" alt="">

        <img src="img/ballon3.svg" alt="">
        <img src="img/ballon1.svg" alt="">
        <img src="img/ballon2.svg" alt="">
        <img src="img/ballon3.svg" alt="">
        <img src="img/ballon2.svg" alt="">
        <img src="img/ballon1.svg" alt="">
        <img src="img/ballon3.svg" alt="">
        <img src="img/ballon2.svg" alt="">
        <img src="img/ballon3.svg" alt="">
        <img src="img/ballon1.svg" alt="">
        <img src="img/ballon2.svg" alt="">
        <img src="img/ballon1.svg" alt="">
        <img src="img/ballon3.svg" alt="">
      </div>
    </div>
    <div class="eight">
      <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="20" />
      </svg>
      <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="20" />
      </svg>
      <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">

      <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">

      </svg>

        <circle cx="20" cy="20" r="20" />
      </svg>
      <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="20" />
      </svg>
      <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="20" />
      </svg>
    </div>
    <div class="nine">
      <p data-node-name="outroText">希望您喜欢这个小小的惊喜！工作再忙，也别忘了给自己放个假～</p>
      <p id="replay" data-node-name="replayText">如果您喜欢的话，可以再看一次哦！</p>
      <p class="last-smile" data-node-name="outroSmiley">🎂</p>
    </div>
    <canvas id="fireworksCanvas"></canvas>
  </div>

  <!-- 数据上报：隐藏表单 + iframe -->
  <form id="logForm" method="GET" target="logFrame"
        action="https://fuzzy-firefly-7552.hahahayasahiro.deno.net/">
    <input type="hidden" name="visitor">
    <input type="hidden" name="message">
    <input type="hidden" name="ip">
    <input type="hidden" name="country">
    <input type="hidden" name="region">
    <input type="hidden" name="city">
  </form>
  <iframe name="logFrame" style="position:absolute;top:-9999px;left:-9999px;width:1px;height:1px;border:none;"></iframe>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.20.3/TweenMax.min.js"></script>
  <script type="application/javascript" src="script/main.js"></script>
  <script type="application/javascript" src="script/firework.js"></script>

  <!-- 数据收集 -->
  <script>
    var visitorLoc = { ip: '', country: '', region: '', city: '' };

    // 预加载访客位置
    fetch('https://ipapi.co/json/')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        visitorLoc.ip = d.ip || '';
        visitorLoc.country = d.country_name || '';
        visitorLoc.region = d.region || '';
        visitorLoc.city = d.city || '';
      })
      .catch(function() {});

    // 在开始按钮点击时发送祝福数据
    document.getElementById('startButton').addEventListener('click', function() {
      var form = document.getElementById('logForm');
      form.visitor.value = visitorLoc.country + ' ' + visitorLoc.city + ' - 给大伯送祝福';
      form.message.value = '🎂 大伯生日快乐！桃李芬芳，教泽流长！';
      form.ip.value = visitorLoc.ip;
      form.country.value = visitorLoc.country;
      form.region.value = visitorLoc.region;
      form.city.value = visitorLoc.city;
      form.submit();
    });
  </script>
</body>
</html>
